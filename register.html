<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body d-flex align-items-center justify-content-center">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; padding: 0;">
    <div class="card p-4 login-card" style="width: 400px; margin: auto; margin-top: 50px; margin-bottom: 50px;">
        <h3 class="text-center fw-bold text-dark mb-3">Register Student Account</h3>
        <p class="text-muted text-center small mb-4">Student Record Performance Portal System.</p>

        <input class="form-control mb-2" placeholder="Full Student Name">
        <input class="form-control mb-2" placeholder="Examination Index Number">
        <input class="form-control mb-2" placeholder="Class Name (e.g., 2 Amanah)">
        <input class="form-control mb-2" placeholder="Preferred Password" type="password">

        <button class="btn btn-primary w-100 btn-login" onclick="alert('School account registration successful! Please log in using the student123 account.')">Register Now</button>
        <a href="index.html" class="d-block text-center mt-3 small text-decoration-none fw-semibold mb-4">Back to Login</a>
        
    </div>
</div>

</body>
</html>
