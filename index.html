<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - High School Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
</head>
<body class="login-body d-flex align-items-center justify-content-center">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; padding: 0;">
    <div class="card p-5 login-card" style="width: 420px; margin: auto;">
        <div class="text-center mb-4">
            <div class="mb-3 d-inline-block p-3 rounded-circle" style="background: rgba(2, 132, 199, 0.1);">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#0284c7" class="bi bi-mortarboard-fill" viewBox="0 0 16 16">
                    <path d="M8.211 2.047a.5.5 0 0 0-.422 0l-7.135 3.567a.5.5 0 0 0 0 .894l7.135 3.568a.5.5 0 0 0 .422 0l7.135-3.568a.5.5 0 0 0 0-.894z"/>
                    <path d="M4.176 9.032a.5.5 0 0 0-.656.327l-.5 1.7a.5.5 0 0 0 .294.605l4.5 1.8a.5.5 0 0 0 .372 0l4.5-1.8a.5.5 0 0 0 .294-.605l-.5-1.7a.5.5 0 0 0-.656-.327L8 10.466z"/>
                </svg>
            </div>
            <h3 class="fw-bold text-dark m-0">Student Portal</h3>
            <p class="text-muted small mt-1">Academic & Co-Curricular Monitoring System</p>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">User ID</label>
            <input type="text" id="username" class="form-control" placeholder="Enter student123">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter 12345">
        </div>
        
        <div id="error" class="text-danger small mb-3 fw-bold text-center"></div>

        <button class="btn btn-primary w-100 btn-login mb-3" onclick="login()">Log In</button>
        <a href="register.html" class="d-block text-center small text-decoration-none fw-semibold">Create an Account</a>
        
        <hr class="my-4 text-muted">
        
    </div>
</div>

</body>
</html>
